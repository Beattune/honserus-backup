#####################################################################
#   MCU
#####################################################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_0D0016000C51313339373836-if00
restart_method: command

#####################################################################
#   Bed Heater
#####################################################################
[heater_bed]
heater_pin: PA0
sensor_type: Generic 3950
sensor_pin: PF3
max_power: 1.0
min_temp: 0
max_temp: 120
control: pid
pid_kp: 29.760
pid_ki: 0.702
pid_kd: 315.576

#####################################################################
#   Chamber Heater
#####################################################################
[heater_generic heater_chamber]
heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF4
max_power: 1.0
min_temp: 0
max_temp: 80
control: pid
pid_kp: 58.437
pid_ki: 2.347
pid_kd: 363.769

#####################################################################
#   Extruder
#####################################################################
[extruder]
step_pin: PE6
dir_pin: !PA14
enable_pin: !PE0
rotation_distance: 22.47
gear_ratio: 50:8
microsteps: 32
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: PB11
sensor_type: Dyze500
sensor_pin: PF7
min_temp: 10
max_temp: 500
max_power: 1.0
min_extrude_temp: 200
max_extrude_only_velocity: 200
max_extrude_only_accel: 8000
max_extrude_only_distance: 101
max_extrude_cross_section: 5
control: mpc
heater_power: 70  
cooling_fan: fan
filament_density: 1.20
filament_heat_capacity: 1.8 
pressure_advance: 0.02
pressure_advance_smooth_time: 0.020

[thermistor Dyze500]
temperature1: 25
resistance1: 4500000
temperature2: 260
resistance2: 2240
temperature3: 460
resistance3: 125.4

#####################################################################
#   Fans
#####################################################################
[heater_fan chamber_heater_fan]
pin: PD13
shutdown_speed: 1.0
heater: heater_chamber
heater_temp: 50

## PCF
[fan]
pin: PE5

## HEF
[heater_fan hotend_fan]
pin: PA8
#cycle_time: 0.00004
#fan_speed: 0.7
#kick_start_time: 0.100
heater_temp: 65

#####################################################################
#   LED Control
#####################################################################
[output_pin caselight]
pin: PB0
pwm: true
shutdown_value: 1
value: 1.0
cycle_time: 0.01

#####################################################################
#   Temperature Sensors
#####################################################################
[temperature_sensor octopus_pro]
sensor_type: temperature_mcu
sensor_mcu: mcu

[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: PF5

[temperature_sensor stepper_rear]
sensor_type: Generic 3950
sensor_pin: PF6