[mcu cartographer]
serial: /dev/serial/by-id/usb-Cartographer_614e_028018000F43304146393320-if00
restart_method: command
is_non_critical: true

[cartographer]
mcu: cartographer
x_offset: 0 
y_offset: 22
verbose: false

[cartographer touch]
UNSAFE_max_touch_temperature: 300

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[adxl345 carto]
cs_pin: cartographer:PA0
spi_bus: spi1
#axes_map: x, -y, -z

[bed_mesh]
zero_reference_position: 174.0, 164.5
speed: 500
mesh_min: 20, 22
mesh_max: 328, 287
probe_count: 20, 20
mesh_pps: 0,0

[axis_twist_compensation]
calibrate_start_x: 20
calibrate_end_x: 328
calibrate_y: 164.5