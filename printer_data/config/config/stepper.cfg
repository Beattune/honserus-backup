# Driver 0
[stepper_z]
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
rotation_distance: 8
microsteps: 64
endstop_pin: probe:z_virtual_endstop
position_min: -2.5
position_max: 250
homing_speed: 10
second_homing_speed: 3
homing_retract_dist: 0

# Driver 1
[stepper_z1]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
rotation_distance: 8
microsteps: 64

# Driver 2
[stepper_z2]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
rotation_distance: 8
microsteps: 64

