# Driver4
[tmc2209 stepper_z]
uart_pin: PF2
sense_resistor: 0.075
run_current: 0.800
interpolate: false
stealthchop_threshold: 0

# Driver5
[tmc2209 stepper_z1]
uart_pin: PE4
sense_resistor: 0.075
run_current: 0.800
interpolate: false
stealthchop_threshold: 0

# Driver 6
