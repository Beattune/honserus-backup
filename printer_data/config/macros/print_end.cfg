[gcode_macro PRINT_END]
gcode:
  M400                           ; wait for buffer to clear
  G92 E0                         ; zero the extruder
  G1 E-10.0 F3600                ; retract filament
  G91                            ; relative positioning
  G0 Z1.00 X20.0 Y20.0 F20000    ; move nozzle to remove stringing
  UPDATE_DELAYED_GCODE ID=chamber_heater_control DURATION=0
  SET_GCODE_VARIABLE MACRO=START_CHAMBER_TEMP_CONTROL VARIABLE=target VALUE=0
  SET_GCODE_VARIABLE MACRO=START_CHAMBER_TEMP_CONTROL VARIABLE=state VALUE='"heating"'
  TURN_OFF_HEATERS

  M107                           ; turn off fan
  G1 Z2 F3000                    ; move nozzle up 2mm
  G90                            ; absolute positioning
  G0 X{printer.toolhead.axis_maximum.x - 10} Y{printer.toolhead.axis_maximum.y -10 } Z{printer.toolhead.axis_maximum.z -50 } F3600            ; park nozzle at rear
  BED_MESH_CLEAR                 ; Clear the bed mesh
  M84