[gcode_macro PRINT_START_HEATSOAK]
gcode:
  {% set S = printer['gcode_macro PRINT_START_SETTINGS'] %}
  {% set target_bed = S.target_bed %}
  {% set target_chamber = S.target_chamber | int %}
  {% set x_wait = S.x_wait %}
  {% set y_wait = S.y_wait %}

  # No chamber target — short bed-only heatsoak
  {% if target_chamber == 0 %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"                                                          # Display info on display
    G1 X{x_wait} Y{y_wait} Z50 F9000                                                                   # Go to center of the bed
    M106 S77                                                                                           # Activate part fans for duct cooling
    M190 S{target_bed}                                                                                 # Heat the bed to target temp
    SET_DISPLAY_TEXT MSG="Soak for 3 min"                                                              # Display info on display
    G4 P180000                                                                                         # Wait for 3 min for heat soak

  # Chamber target set — heat chamber first, then bring bed to print temp
  {% else %}
    SET_DISPLAY_TEXT MSG="Target Chamber: {target_chamber}c"                                           # Display info on display
    G1 X{x_wait} Y{y_wait} Z100 F9000                                                                  # Go to center of the bed
    M106 S77                                                                                           # Activate part fans for duct cooling
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=110                                                # Activate bed heater
    _HEATSOAK_CORE CHAMBER={target_chamber}                                                            # Heatsoak chamber and activate temp control
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"                                                          # Display info on display
    M190 S{target_bed}                                                                                 # Heat the bed to target temp
  {% endif %}

  # Preheat hotend to safe temp for probing
  SET_DISPLAY_TEXT MSG="Hotend: 150c"                                                                  # Display info on display
  M104 S150                                                                                            # Heat the extruder to 150c
