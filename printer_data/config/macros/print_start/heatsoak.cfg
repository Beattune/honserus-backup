[gcode_macro PRINT_START_HEATSOAK]
gcode:
  {% set S = printer['gcode_macro PRINT_START_SETTINGS'] %}
  {% set target_bed = S.target_bed %}
  {% set target_chamber = S.target_chamber %}
  {% set x_wait = S.x_wait %}
  {% set y_wait = S.y_wait %}

  # Check if chamber_temp is set to 0c - if so then trigger a short heatsoak
  {% if chamber_temp == 0 %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"                                                          # Display info on display
    G1 X{x_wait} Y{y_wait} Z50 F9000                                                                   # Go to center of the bed
    M106 S77                                                                                           # Activate part fans for duct cooling
    M190 S{target_bed}                                                                                 # Heat the  bed to target temp
    SET_DISPLAY_TEXT MSG="Soak for 3 min"                                                              # Display info on display
    G4 P180000                                                                                         # Wait for 3 min for heat soak

  # If the chamber temp is above 0c, then start heatsoaking
  {% else %}
    SET_DISPLAY_TEXT MSG="Target Chamber: {target_chamber}c"                                           # Display info on display
    G1 X{x_wait} Y{y_wait} Z100 F9000                                                                  # Go to center of the bed
    M106 S77                                                                                           # Activate part fans for duct cooling
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=110                                                # Activate bed heater
    SET_HEATER_TEMPERATURE HEATER=heater_chamber TARGET=70                                             # Activate chamber heater
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber}                      # Wait for chamber temp
    SET_HEATER_TEMPERATURE HEATER=heater_chamber TARGET={target_chamber}                               # Set chamber heater to chamber target temp
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"                                                          # Display info on display
    M190 S{target_bed}                                                                                 # Heat the bed to target temp
  {% endif %}

  # Preheat hotend
  SET_DISPLAY_TEXT MSG="Hotend: 150c"                                                                  # Display info on display
  M104 S150                                                                                            # Heat the extruder to 150c

# Delayed G-code to start chamber fans after bed heating
[delayed_gcode chamber_heater_control]
initial_duration: 0.0
gcode:
  {% set S = printer['gcode_macro PRINT_START_SETTINGS'] %}
  {% set target_chamber = S.target_chamber %}
  {% set chamber_temp = printer['temperature_fan chamber_exhaust'].temperature %}
  ####
  {% set chamber_temp = printer['temperature_fan chamber_exhaust'].temperature %}
  {% set target_temp = printer['temperature_fan chamber_exhaust'].target %}  # Dynamically get exhaust target
  {% set bed_target = printer.heater_bed.target %}
  {% set bed_temp = printer.heater_bed.temperature %}
    
  # Check if bed is heating and at target
  {% if bed_target > 0 and bed_temp >= (bed_target - 2) %}
      # Bed is at temperature, turn on chamber fans
      {% if chamber_temp < target_temp %}
          SET_FAN_SPEED FAN=bed_chamber SPEED=1.0
      {% elif chamber_temp >= target_temp %}
          # Temperature reached target, turn off chamber fans
          SET_FAN_SPEED FAN=bed_chamber SPEED=0.0
        {% endif %}
  {% else %}
      # Bed not at target, keep chamber fans off
      SET_FAN_SPEED FAN=bed_chamber SPEED=0.0
  {% endif %}
    
  # Re-run this check every 5 seconds
  UPDATE_DELAYED_GCODE ID=chamber_fan_control DURATION=5