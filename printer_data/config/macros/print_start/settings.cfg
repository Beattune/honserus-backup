[gcode_macro _PRINT_START_SETTINGS]
gcode:
  # Variables from Slicer
  {% set variable_target_bed = params.BED | int %}
  {% set variable_target_extruder = params.EXTRUDER | int %}
  {% set variable_target_chamber = params.CHAMBER | default("25") | int %}
  {% set variable_target_chamber_minimal = params.CHAMBER_MINIMAL | default("0") | int %}
  {% set variable_target_chamber_wait = [target_chamber, target_chamber_minimal] | select(">", 0) | min | default(0) %}
  {% set variable_bed_mesh = params.BED_MESH|default('adaptive') | string %}
  {% set variable_filament_type = params.FILAMENT_TYPE | string  | upper %}
  {% set variable_filament_density = params.FILAMENT_DENSITY | float %}
  
  # Variables from printer
  {% set variable_x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set variable_y_wait = printer.toolhead.axis_maximum.y|float / 2 %}
  