#####################################################################
#   Temperature Sensors
#####################################################################
[temperature_sensor octopus_pro]
sensor_type: temperature_mcu
sensor_mcu: mcu

[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: PF5

[temperature_sensor stepper_rear]
sensor_type: Generic 3950
sensor_pin: PF6

#####################################################################
#   Fan Control
#####################################################################

#####################################################################
#   LED Control
#####################################################################
[output_pin caselight]
pin: PB0
pwm:true
shutdown_value: 0
value:1
cycle_time: 0.01

