#####################################################################
# Base configuration
#####################################################################
[printer]
kinematics: corexy
max_velocity: 500
max_accel: 30000
max_z_velocity: 50
max_z_accel: 1000
square_corner_velocity: 30
minimum_cruise_ratio: 0

[idle_timeout]
timeout: 3600 #1800

[temperature_sensor raspberry_pi]
sensor_type: temperature_host

#####################################################################
# Includes
#####################################################################
[include mainsail.cfg]
[include octopus.cfg]
[include driver.cfg]
[include stepper.cfg]
[include nh36.cfg]
[include carto.cfg]
[include nozzle_adxl.cfg]
[include shaketune.cfg]

# Macros
[include macros/*.cfg]

# Klipper Auto Speed
[auto_speed]

#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################
[safe_z_home]
home_xy_position: 170, 175
z_hop: 10
home_y_before_x: true

[z_tilt]
z_positions:
   -50, 18
   175, 398
   400, 18
points:
   30, 5
   175, 295
   320, 5
speed: 200
horizontal_move_z: 20
retries: 5
retry_tolerance: 0.0075

#####################################################################
#   Input Shaper
#####################################################################
[resonance_tester]
accel_chip: adxl345 nozzle #nh36
accel_per_hz: 125
sweeping_accel: 400
sweeping_period: 0
probe_points: 170, 175, 20
max_freq: 200

[input_shaper]
shaper_freq_x: 140.8
shaper_freq_y: 75.4
shaper_type_x: mzv
shaper_type_y: mzv
damping_ratio_x: 0.056
damping_ratio_y: 0.058

