#####################################################################
# PRINTER
#####################################################################
[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 30
max_z_accel: 350
square_corner_velocity: 5.0

[idle_timeout]
timeout: 1800

#####################################################################
# INCLUDES
#####################################################################
[include mainsail.cfg]
[include octopus.cfg]
[include driver.cfg]
[include stepper.cfg]
[include nh36.cfg]
[include carto.cfg]

[include macros/*.cfg]

#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################
[safe_z_home]
home_xy_position: 175, 175

[z_tilt]
z_positions:
   -50, 18
   175, 398
   400, 18
points:
   30, 5
   175, 295
   320, 5
speed: 200
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
use_probe_xy_offsets: True

