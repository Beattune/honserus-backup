#####################################################################
# Base configuration
#####################################################################
[printer]
kinematics: corexy
max_velocity: 750
max_accel: 100000
max_z_velocity: 50
max_z_accel: 1000
square_corner_velocity: 10
minimum_cruise_ratio: 0

[idle_timeout]
timeout: 1800

[temperature_sensor raspberry_pi]
sensor_type: temperature_host

#####################################################################
# Includes
#####################################################################
# Hardware
[include config/octopus.cfg]
[include config/driver.cfg]
[include config/stepper.cfg]
[include config/carto.cfg]
[include config/nozzle_adxl.cfg]

# Plugins
[include mainsail.cfg]
[include config/motor_sync.cfg]
[include config/shaketune.cfg]
[include config/tmc_autotune.cfg]

# Macros
[include macros/*.cfg]
[include macros/print_start/*.cfg]
[include macros/overrides/*.cfg]

# Klipper functions
[skew_correction]

#####################################################################
#   Gantry Adjustment Routines
#####################################################################
[safe_z_home]
home_xy_position: 174.0, 164.5
z_hop: 10
speed: 300
home_y_before_x: true

[z_tilt_ng]
points:
   30, 5
   174, 295
   320, 5
speed: 300
horizontal_move_z: 20
retries: 5
retry_tolerance: 0.0075
adaptive_horizontal_move_z: True

#####################################################################
#   Input Shaper
#####################################################################
[resonance_tester]
accel_chip: adxl345 carto #nozzle #nh36
accel_per_hz: 125
sweeping_accel: 400
sweeping_period: 0
probe_points: 170, 175, 20
max_freq: 200

[input_shaper]
shaper_freq_x: 120.0
shaper_freq_y: 75.2
shaper_type_x: mzv
shaper_type_y: mzv
damping_ratio_x: 0.036
damping_ratio_y: 0.035

